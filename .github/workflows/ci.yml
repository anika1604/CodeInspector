name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  realtime-server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/realtime-server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/realtime-server/package.json
      - run: npm install
      - run: npm run build

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package.json
      - run: npm install
      - run: npm run build
        env:
          VITE_API_URL: http://localhost:8000

  ml-risk-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-risk-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import app.main"  # smoke import check

  llm-agent-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/llm-agent-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -c "import app.main"
